<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClínicAPP+ - {% block title %}{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>

    <div class="d-flex">
        <div class="sidebar">
            <div class="brand">
                <i class="bi bi-hospital fs-3 text-primary"></i>
                <span>ClínicAPP+</span>
            </div>
            <nav>
                <a href="/" class="{{ 'active' if request.path == '/' }}"><i class="bi bi-grid-fill"></i> Dashboard</a>
                <a href="/mis-reservas" class="{{ 'active' if request.path == '/mis-reservas' }}"><i class="bi bi-calendar3"></i> Agenda</a>
                <a href="/seccion-reservas" class="{{ 'active' if request.path == '/seccion-reservas' }}"><i class="bi bi-plus-circle"></i> Nueva Cita</a>
            </nav>
            <div class="user-pill text-white">
                <div class="avatar-circle">AD</div>
                <div class="small">
                    <div class="fw-bold">Admin</div>
                    <div class="opacity-50">Administrador</div>
                </div>
            </div>
        </div>

        <div class="main-content w-100">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
